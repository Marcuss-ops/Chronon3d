# ────────────────────────────────────────────────────────────────────────
# touchpoint_thresholds.yaml — manual_touches_per_video config (Test #19)
# ────────────────────────────────────────────────────────────────────────
#
# Schema-canonical config for the First-Principles Product Check Test #19:
# `manual_touches_per_video` counter with per-phase thresholds.
#
# This file is the SINGLE SOURCE OF TRUTH for:
#   - the 9 canonical touchpoint operation kinds
#   - the 4 production-phase thresholds (oggi / fase1 / fase2 / finale)
#   - the JSONL append-only event log path
#
# Per AGENTS.md v0.1 Cat-3 (zero new public SDK API surface):
#   the kind list + thresholds are config-only, NOT hardcoded in apps/chronon3d_cli/.
#   CLI11 IsMember validator reads from this file at startup.
#   tools/check_manual_touches_per_video.sh reads from this file at gate time.
#
# Per AGENTS.md v0.1 §honesty:
#   the 9-op canonical list replaces the prior phantom Test #8 kebab-case list
#   (rename-file / clip-selected / text-corrected / timing-fixed / font-changed
#   / job-rerun / output-checked / manual-upload) which was claimed in
#   CHANGELOG line 355 but NEVER landed on disk or origin/main. The phantom-
#   claim is audited retroactively; this config ships the canonical schema.
#
# Per AGENTS.md v0.1 §regole ("non espandere API non necessaria"):
#   exactly the 9 user-spec ops; no more, no less. Adding a 10th kind requires
#   an ADR + a per-kind dashboard panel + a per-kind threshold derivation.

# ── Channel (parallel pattern to configs/pilot.tiktok.yaml) ──────────────
channel: "manual_touches"

# ── Canonical 9 touchpoint operation kinds (snake_case canonical) ────────
# Order is canonical (test order = render order); do NOT reorder without
# an ADR. The order doubles as the "favorite op" default hint in the
# dashboard panel.
ops:
  - rename        # filename rename for output.mp4 variants
  - copy          # intermediate file copy between pipeline stages
  - clip          # source clip trim/select from raw footage
  - text_fix      # text layer content correction post-render
  - timing        # frame timing offset / trim
  - font          # font fallback or font-change on visible glyphs
  - relaunch      # full renderer re-launch (delete + rebuild + reattempt)
  - output_check  # manual visual review of output.mp4 / PNG
  - upload        # manual upload to platform (YouTube/IG/TT/etc.)

# ── 4 production phases with hard thresholds (user-spec verbatim) ───────
# Each phase has a MAX_ALLOWED count of distinct-touch-kind events per
# video (de-duplicated across runs of the same video). The thresholds
# encode the production-readiness funnel:
#   oggi   = today baseline (~8 manual touches is "normal")
#   fase1  = first cleanup pass (~3 manual touches)
#   fase2  = second cleanup pass (~1 manual touch)
#   finale = production-grade (0 manual touches = perfect)
#
# Per AGENTS.md "no stime percentuali", thresholds are EXACT integers
# (not ranges, not estimates). The `comparison` field standardizes the
# gate's verdict logic.
phases:
  - id: oggi
    label: "Oggi baseline"
    max_allowed: 8
    comparison: "<="
  - id: fase1
    label: "Fase 1 — prima pass pulizia"
    max_allowed: 3
    comparison: "<="
  - id: fase2
    label: "Fase 2 — seconda pass pulizia"
    max_allowed: 1
    comparison: "<="
  - id: finale
    label: "Finale — produzione"
    max_allowed: 0
    comparison: "<="

# ── Append-only event log path (mirrors ~/.chronon3d/pilot/tiktok/pilot.jsonl) ──
log_path: "~/.chronon3d/telemetry/manual_touches.jsonl"

# ── Event schema (one JSONL line per distinct-kind event per run) ──────
# Fields:
#   ts              ISO 8601 UTC, when the event was recorded
#   run_id          the chronon3d_cli render run_id (matches render_runs.run_id)
#   composition_id  the composition name
#   phase           one of {oggi, fase1, fase2, finale}
#   op              one of the 9 canonical ops above
#   actor           "human" (manual touchpoint) | "agent" (auto-recorded by agent)
#   note            free-text optional (≤200 chars)
event_schema:
  required_fields: [ts, run_id, composition_id, phase, op, actor]
  optional_fields: [note]
  phase_enum: [oggi, fase1, fase2, finale]
  op_enum_source: "this file's `ops` list"

# ── De-duplication rule (canonical, single source of truth) ────────────
# Per (run_id, op) pair: only the FIRST event counts toward the per-phase
# total. A 2nd `relaunch` event on the same run_id is ignored. This honors
# the "one touchpoint per kind per render" semantic from Test #16 IG pilot
# precedent — the runner SHOULD resolve the root cause rather than retouch.
dedup_key: "(run_id, op)"
dedup_strategy: "keep first; ignore subsequent"

# ── Dashboard panel endpoint (extension of /api/runs pattern) ──────────
# Per AGENTS.md "non introdurre GUI ... nel core headless CPU-first":
# the dashboard panel is OPTIONAL telemetry surfacing, NOT GUI; it re-exports
# the gate's verdict shape via Flask. Host = telemetry-dashboard backend.
dashboard:
  endpoint: "/api/pilot/manual_touches"
  method: "GET"
  query_params:
    phase: "one of oggi|fase1|fase2|finale (default: returns all phases)"
    since: "ISO 8601 datetime; events.ts >= since"
  response_shape:
    phase_totals:
      phase_id: "string"
      max_allowed: "int"
      actual: "int (de-duplicated counts)"
      status: "PASS | FAIL | NO-DATA"
    per_op: "dict<op → count across all filtered events>"
    violating_ops: "list<op> where actual > max_allowed"

# ─────────────────────────────────────────────────────────────────────────
# perf_regression_gate — automatic perf-regression gate (F1.6 / TICKET-PERF-GATE-V1)
# ─────────────────────────────────────────────────────────────────────────
# Schema-canonical config for tools/check_perf_regression.sh.
# This block is the SINGLE SOURCE OF TRUTH for:
#   - the 6 metric-failure thresholds (3 multiplicative + 3 absolute-increase)
#   - the burst-rerun retry policy (min/max attempts)
#   - the Mann-Whitney alpha significance level
#   - the close-call guardband width (within X% of threshold → retry)
#
# Per AGENTS.md v0.1 Cat-3 (zero new public SDK API surface):
#   the threshold values are config-only, NOT hardcoded in tools/check_perf_regression.sh
#   (the script reads them via python3 yaml.safe_load OR falls back to defaults below
#    if pyyaml is missing from the venv — the bench runner tools/benchmark_host_info.sh
#    is the canonical yaml parser elsewhere in the project).
#   tools/check_perf_regression.sh reads from this block at gate time.
#
# Per AGENTS.md v0.1 §honesty:
#   thresholds are EXACT numeric multipliers (not ranges, not estimates) per the
#   "no stime percentuali" rule. Each multiplier below carries the user-spec verbatim
#   value: median_pct=1.03 (3% regression budget), p95_pct=1.05 (5% regression budget),
#   peak_rss_pct=1.05 (5% regression budget).
# Per AGENTS.md v0.1 §regole ("non espandere API non necessaria"):
#   exactly the 6 user-spec metrics mapped to bench.v3 schema fields (see §Field
#   mapping in docs/tickets/TICKET-PERF-GATE-V1.md for the verbatim mapping); no
#   more, no less. Adding a 7th metric requires an ADR + bench.v4 schema amendment.
#
# Companion to: tools/lib_perf_regression.py (python3 stdlib Mann-Whitney U test)
#                tools/check_perf_regression.sh (3-exit-codes bash wrapper)
#                tools/wrap_push.sh Step 4.5q (optional PERF_GATE=enabled pre-flight hook)
perf_regression_gate:
  version: "perf_gate_v1"
  channel: "perf_regression_gate"

  # ── 6 metric thresholds (numeric multiplicative + absolute-increase) ─────────
  # The 3 multiplicative thresholds compare current/baseline > threshold.
  #   median:        metrics.median_frame_ms (alias p50 in bench.v3)
  #   p95:           metrics.p95_frame_ms
  #   peak_rss:      memory.peak_rss_mb
  # The 3 absolute-increase thresholds compare current > baseline (any strict
  # increase counts as regression per user spec verbatim "se aumentano"):
  #   full_frame_copies:           counters.full_frame_passes (semantic mapping in
  #                                docs/tickets/TICKET-PERF-GATE-V1.md §Field mapping)
  #   allocations_per_frame:       memory.allocations_per_frame (per bench.v3)
  #   output_hash:                  quality.deterministic_hash (per bench.v3)
  thresholds:
    median_pct: 1.03               # 3 % regression budget on median frame time
    p95_pct: 1.05                  # 5 % regression budget on p95 frame time
    peak_rss_pct: 1.05             # 5 % regression budget on peak RSS memory

  # ── Close-call guardband width ─────────────────────────────────────────────────
  # A measure is "close-call" iff ratio > threshold * (1 - close_call_band_pct).
  # Within this band, the gate invokes the burst-rerun resolver (Mann-Whitney U
  # test on 10-20 fresh samples vs baseline) per user spec verbatim "Per misure
  # vicine alla soglia: riesegui 10-20 volte e usa mediane con test Mann-Whitney
  # semplice". 0.20 default = "within 20% of the regression cliff".
  close_call_band_pct: 0.20

  # ── Burst-rerun retry policy ──────────────────────────────────────────────────
  # Number of additional samples to collect when a metric enters close-call.
  # Spec verbatim: "10-20 volte". Capped at retry_attempts_max to prevent
  # runaway-rebuild cycles; floor at retry_attempts_min per spec.
  retry_attempts_min: 10
  retry_attempts_max: 20

  # ── Mann-Whitney U test significance level ──────────────────────────────────
  # Two-sided p-value threshold. p <= alpha → reject null hypothesis
  # (distributions differ) → escalate close-call to hard FAIL.
  # alpha=0.05 is the standard CI default; widen via forward-point ADR if needed.
  mann_whitney_alpha: 0.05

  # ── Bypass flag for deterministic hash mismatch ───────────────────────────────
  # The `--allow-golden-change` CLI flag on tools/check_perf_regression.sh
  # bypasses the output_hash hard-FAIL only. All other metrics remain gated.
  # Rationale (per user spec verbatim "o se cambia output_hash senza flag"):
  # some commits legitimately change the rendered output (e.g. text-color fix);
  # the operator explicitly opts in via the flag instead of being silently passed.
  allow_golden_change_flag: "--allow-golden-change"

  # ── Output format (parallel to verify_*_linux.sh family) ──────────────────────
  # Emitted per the canonical AGENTS.md §Lint-checkability INFO-level diagnostic
  # pattern: GATE_NAME → canonical basename, [INFO]/[WARN]/GATE_FAIL as prefixes.
  diagnostic_style: "aggressive_info"   # verbose PASS line per metric verified

  # ── Companion scripts (SSoT cross-link) ──────────────────────────────────────
  # Each threshold key is consumed by exactly one downstream script; this map is
  # the lineage cross-link (per docs/DOCUMENTATION_GOVERNANCE §ADR lineage).
  # No threshold is hardcoded downstream — the gate script reads from THIS block.
  lineage:
    metric_to_script: "tools/lib_perf_regression.py::compare_to_baseline"
    decision_policy:  "tools/lib_perf_regression.py::decide"
    burst_resolver:   "tools/lib_perf_regression.py::mann_whitney_u + imperative rerun in tools/check_perf_regression.sh"
    wrap_push_hook:   "tools/wrap_push.sh Step 4.5q (PERF_GATE=enabled optional)"
