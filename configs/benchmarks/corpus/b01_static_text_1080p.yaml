# configs/benchmarks/corpus/b01_static_text_1080p.yaml
# ─────────────────────────────────────────────────────────────────────────
# Benchmark corpus — Scene B01: StaticText1080p
# ─────────────────────────────────────────────────────────────────────────
# Purpose (user-spec §3 verbatim):
#   "Shaping, rasterizzazione, cache" — single static text layer at
#   1920x1080 to stress shaping/rasterization cache behaviour without any
#   animation overhead.
#
# Per AGENTS.md v0.1 Cat-3 + §honesty: metadata-only, no new SDK surface;
# comp_id references the canonical production text composition.
# ─────────────────────────────────────────────────────────────────────────

schema_version: "benchmark_corpus_v1"

scene_id: "B01"
display_name: "StaticText1080p"
category: "text_shaping_raster"
intent: |
  Misura shaping del testo, rasterizzazione dei glifi e cache hit-rate.
  Single layer statico (no animation) a 1920x1080 — isola il costo del
  shaping pipeline dal costo di animation/transform.

comp_id: "MinimalistFocusQuote"
canonical_render:
  command: "chronon3d_cli video MinimalistFocusQuote --start 0 --end 30 --fps 30"
  output_path: "/tmp/benchmark_corpus_b01.mp4"

thread_matrix:
  cpu-low:  [1, 2, 4]
  cpu-mid:  [1, 2, 4, 8, 16]
  cpu-high: [1, 4, 8, 16, 32, 64]
frame_rates: [30]
resolution_options: [{ width: 1920, height: 1080 }]
duration_seconds_options: [1, 5]
variant_matrix:
  - { cache_state: "cold", media: "mp4" }   # 1st render — no shaping cache hit
  - { cache_state: "warm", media: "mp4" }   # 2nd render — cache warm

expected_metrics:
  - time_to_first_frame_ms
  - frame_p50_ms
  - frame_p95_ms
  - glyph_count
  - cache_hit_ratio        # expect high (≈ 1.0) for static text
  - allocations_per_frame  # expect 0 steady-state post-init
  - peak_rss_mb
  - output_hash_pixels     # deterministic per ShapedGlyphLine
  - cost_per_minute_eur

forward_points:
  - { name: "ShapedGlyphLine cache pre-warm verification", ticket: "TICKET-SHAPED-GLYPH-LINE-PREWARM" }

cross_link:
  - "include/chronon3d/text/glyph_layout.hpp::ShapedGlyphLine (canonical shaping)"
  - "tests/content/test_shaped_glyph_line.cpp (6 TEST_CASEs lock)"
  - "configs/benchmark_machines.yaml"
