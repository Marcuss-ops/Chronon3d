# Chronon3D nginx reverse-proxy config
#
# Pins HTTPS on 0.0.0.0:443 with self-signed cert + basic-auth.
# Fronts two local services:
#   - Vite dev server on  127.0.0.1:5173  (React dashboard, /)
#   - Flask backend on   127.0.0.1:8000  (REST API + artifacts, /api /artifact /socket.io /output)
#
# Run with:
#   nginx -c /home/pierone/.chrono3d/nginx/nginx.conf -p /home/pierone/.chrono3d/nginx/

worker_processes  1;
pid               /home/pierone/.chrono3d/nginx/nginx.pid;
error_log         /home/pierone/.chrono3d/nginx/error.log warn;

events {
    worker_connections  1024;
}

http {
    access_log          /home/pierone/.chrono3d/nginx/access.log;
    client_body_temp_path /home/pierone/.chrono3d/nginx/client_body;
    proxy_temp_path       /home/pierone/.chrono3d/nginx/proxy;
    fastcgi_temp_path     /home/pierone/.chrono3d/nginx/fastcgi;
    uwsgi_temp_path       /home/pierone/.chrono3d/nginx/uwsgi;
    scgi_temp_path        /home/pierone/.chrono3d/nginx/scgi;

    default_type        application/octet-stream;
    sendfile            on;
    keepalive_timeout   65;

    # ── SSL settings (modern only) ──────────────────────────────────────
    ssl_certificate     /home/pierone/.chrono3d/nginx/cert.pem;
    ssl_certificate_key /home/pierone/.chrono3d/nginx/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES:!RC4;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Per-IP rate limit (10 r/s, burst 20) ────────────────────────────
    limit_req_zone $binary_remote_addr zone=chronon:10m rate=10r/s;

    # ── WebSocket upgrade map (must be at http{} level, BEFORE any server) ─
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── HTTPS server (port 443) ──────────────────────────────────────────
    server {
        listen 0.0.0.0:443 ssl;
        server_name _;

        # 50 MB upload limit (artifacts can be large)
        client_max_body_size 50M;

        # No basic-auth: dashboard is publicly accessible on this private VPS.
        limit_req               zone=chronon burst=20 nodelay;

        # Common reverse-proxy headers (shared by all upstreams, includes WS)
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_redirect     off;

        # ─── Flask backend on 8000 ────────────────────────────────────
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
        }
        location /artifact {
            proxy_pass http://127.0.0.1:8000;
        }
        location /socket.io/ {
            proxy_pass http://127.0.0.1:8000;
        }
        location /output {
            proxy_pass http://127.0.0.1:8000;
        }

        # ─── React dashboard on 5173 (Vite dev) ──────────────────────
        # NOTE: Vite needs WebSocket HMR via the SAME location / handler,
        # not a sub-location.  proxy_set_header Upgrade/Connection is set
        # at server-level above so it reaches this block too.
        location / {
            proxy_pass http://127.0.0.1:5173;
        }
    }

    # ── HTTP → HTTPS redirect (port 80) ──────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
