# ═══════════════════════════════════════════════════════════════════════════════
# gates-full-validation.yml — Gate 6 / heavy preset on critical paths
# ═══════════════════════════════════════════════════════════════════════════════
#
# The expensive gate. Triggered ONLY when the PR touches the SDK / engine
# surface area: include/chronon3d/**, src/**, CMakeLists.txt, CMakePresets.json,
# vcpkg.json, or any workflow file. Cheap PRs (docs-only, scripts-only) don't
# pay this cost, but a PR that silently changes a critical path DOES.
#
# Why a separate workflow:
# `on:` at the workflow top-level accepts a `paths:` filter, which is the
# canonical GitHub Actions way to gate expensive jobs. Inside a single
# workflow file, the `if:` expression based on `changed_files` requires a
# brittle comma-joined-substring contains() check (see #4 in the previous
# review). Splitting the heavy job into its own workflow lets the `paths:`
# filter do the work in a single well-formed YAML scalar.

name: Chronon Gates (full-validation)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'include/chronon3d/**'
      - 'src/**'
      - 'experimental/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - '.github/workflows/**'
      - 'tools/**'
      - 'tests/**'

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
  VCPKG_COMMIT: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

jobs:
  full-validation:
    name: Gate 6 / full-validation (full preset)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure (linux-ci-full-validation preset)
        run: cmake --preset linux-ci-full-validation

      - name: Build (chronon3d_cli + chronon3d_tests)
        run: cmake --build --preset linux-ci-full-validation

      - name: Run full test suite
        run: ctest --preset linux-ci-full-validation-test --output-on-failure
