name: Chronon Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax
        run: |
          bash -n tools/*.sh

      - name: Check CMake syntax
        run: |
          find . -name "CMakeLists.txt" -exec bash -c 'cmake --system-information /dev/null > /dev/null' \;
          # (Basic check, real validation happens in build)
