# ═══════════════════════════════════════════════════════════════════════════════
# gates-release-validation.yml — V1 stable release-contract gate
# ═══════════════════════════════════════════════════════════════════════════════
#
# Renamed from gates-full-validation.yml on 2026-06-24 after splitting
# `linux-full-validation` into `linux-release-validation` (V1 stable contract,
# this workflow) + `linux-experimental-validation` (forward-looking, see
# gates-experimental-validation.yml).
#
# The release-contract gate. Triggered ONLY when the PR touches the SDK /
# engine surface area that the V1 release ships: include/chronon3d/**,
# src/**, CMakeLists.txt, CMakePresets.json, vcpkg.json, or any workflow /
# tool / tests file. Cheap PRs (docs-only, scripts-only) don't pay this
# cost, but a PR that silently changes a critical path DOES.
#
# Note on path filter: `experimental/**` is intentionally EXCLUDED here.
# Touching experimental-only files should NOT pay the full release-contract
# build cost (Release build + V1-stable vcpkg dep set) — the
# gates-experimental-validation.yml workflow owns the experimental path and
# already includes the experimental vcpkg deps (icu, libtess2, msdfgen).
#
# Why a separate workflow per contract:
# Splitting the two contracts into two workflow files lets each `paths:`
# filter do the work in a single well-formed YAML scalar. The original
# gates-full-validation.yml conflated both contracts in a single gate;
# after the split a PR touching only experimental/ no longer pays the
# V1-release-cost and vice-versa.

name: Chronon Gates (release-validation)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'include/chronon3d/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - '.github/workflows/**'
      - 'tools/**'
      - 'tests/**'

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
  VCPKG_COMMIT: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

jobs:
  release-validation:
    name: Gate / release-validation (V1 contract)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure (linux-release-validation preset)
        run: cmake --preset linux-release-validation

      - name: Build (chronon3d_cli + chronon3d_tests)
        run: cmake --build --preset linux-release-validation

      - name: Run release-contract test suite
        run: ctest --preset linux-release-validation-test --output-on-failure
