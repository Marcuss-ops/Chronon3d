name: Build Check

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            C:/Users/runneradmin/.xmake
          key: xmake-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-

      - name: Configure (video OFF)
        run: xmake f -m release --video=n -y

      - name: Dev build (no video) — deve stare sotto 60s
        id: clean_build
        run: |
          $start = Get-Date
          xmake build chronon3d_cli
          $elapsed = (Get-Date) - $start
          $secs = [int]$elapsed.TotalSeconds
          Write-Host "Build time: ${secs}s"
          if ($secs -gt 60) {
            Write-Error "FAIL: clean build ha impiegato ${secs}s (limite: 60s)"
            exit 1
          }

      - name: Incremental build — deve stare sotto 10s
        run: |
          (Get-Item "src\core\pipeline.cpp").LastWriteTime = Get-Date
          $start = Get-Date
          xmake build chronon3d_cli
          $elapsed = (Get-Date) - $start
          $secs = [int]$elapsed.TotalSeconds
          Write-Host "Incremental time: ${secs}s"
          if ($secs -gt 10) {
            Write-Error "FAIL: incremental build ha impiegato ${secs}s (limite: 10s)"
            exit 1
          }

      - name: Verify no FFmpeg in core/graph deps
        run: xmake f --video=n -y

  build-with-examples:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            C:/Users/runneradmin/.xmake
          key: xmake-examples-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-examples-${{ runner.os }}-

      - name: Configure (examples ON, video OFF)
        run: xmake f -m release --examples=y --video=n -y

      - name: Build CLI with examples
        run: xmake build chronon3d_cli
