# ═══════════════════════════════════════════════════════════════════════════════
# nightly-sanitizers.yml — P2-A sanitizer schedule
# ═══════════════════════════════════════════════════════════════════════════════
#
# Moved from ci.yml (every push) to nightly schedule:
#   ASan+UBSAN → daily at 02:00 UTC
#   TSan       → weekly, Sunday at 03:00 UTC
#
# Rationale: sanitizers add 2-5× runtime overhead. Running on every push
# delays fast feedback. Nightly/weekly is sufficient to catch regressions.
#
# Unity build is OFF for both sanitizer presets to avoid hiding cross-TU
# data races (unity merges TUs, masking true thread-safety issues).
#
# Manual trigger: workflow_dispatch for debugging.
# ═══════════════════════════════════════════════════════════════════════════════

name: Chronon Sanitizers (nightly)

on:
  schedule:
    # ASan+UBSAN: daily at 02:00 UTC
    - cron: '0 2 * * *'
    # TSan: weekly, Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      sanitizer:
        description: 'Which sanitizer to run (asan or tsan)'
        required: false
        default: 'asan'
        type: choice
        options:
          - asan
          - tsan
          - both

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
  VCPKG_COMMIT: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # ASan + UBSan — runs daily at 02:00 UTC and on manual dispatch
  # ─────────────────────────────────────────────────────────────────────
  asan-ubsan:
    name: Sanitizer / ASan+UBSAN (nightly)
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.sanitizer == 'asan' || github.event.inputs.sanitizer == 'both')
      || github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure (linux-asan, unity OFF)
        run: cmake --preset linux-asan

      - name: Build (chronon3d_cli + chronon3d_tests)
        run: cmake --build --preset linux-asan --target chronon3d_cli chronon3d_tests

      - name: Run tests under ASan+UBSAN
        run: ctest --preset linux-asan-test --output-on-failure

  # ─────────────────────────────────────────────────────────────────────
  # TSan — runs weekly (Sunday 03:00 UTC) and on manual dispatch
  # ─────────────────────────────────────────────────────────────────────
  tsan:
    name: Sanitizer / TSan (weekly)
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.sanitizer == 'tsan' || github.event.inputs.sanitizer == 'both')
      || github.event.schedule == '0 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure (linux-tsan, unity OFF)
        run: cmake --preset linux-tsan

      - name: Build (chronon3d_cli + chronon3d_tests)
        run: cmake --build --preset linux-tsan --target chronon3d_cli chronon3d_tests

      - name: Run tests under TSan
        run: ctest --preset linux-tsan-test --output-on-failure
