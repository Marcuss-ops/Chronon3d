# ═══════════════════════════════════════════════════════════════════════════════
# ci.yml — Chronon3d CI Pipeline
#
# Triggers:
#   push to main    → Full suite (build + run ALL tests)
#   pull_request    → Fast suite (build + run only fast tests for quick feedback)
#
# Matrix:
#   linux-ci            — Debug build (profiling OFF, faster compile), full suite
#   linux-ci-nocontent  — Debug, no content modules (validates modular build)
#   linux-asan          — Address Sanitizer + Undefined Behavior Sanitizer
# ═══════════════════════════════════════════════════════════════════════════════

name: Chronon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Linux (Release)
            os: ubuntu-latest
            preset: linux-release
            build_preset: linux
            test_preset: linux-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Linux (Debug/CI)
            os: ubuntu-latest
            preset: linux-ci
            build_preset: linux-ci
            test_preset: linux-ci-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Linux (No Content)
            os: ubuntu-latest
            preset: linux-ci-nocontent
            build_preset: linux-ci-nocontent
            test_preset: linux-ci-nocontent-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Linux (ASAN+UBSAN)
            os: ubuntu-latest
            preset: linux-asan
            build_preset: linux-asan
            test_preset: linux-asan-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Windows (Release)
            os: windows-latest
            preset: win-release
            build_preset: win
            test_preset: win-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ matrix.config.vcpkg_commit }}

      # ── Configure (vcpkg installs dependencies automatically) ─────────
      - name: Configure
        run: cmake --preset ${{ matrix.config.preset }}

      # ── Build: fast tests on PR, full suite on push to main ───────────
      # Note: parallelism is handled by CMakePresets.json ("jobs": 16).

      - name: Build (Fast — PR)
        if: github.event_name == 'pull_request'
        run: cmake --build --preset ${{ matrix.config.build_preset }} --target chronon3d_tests_fast

      - name: Build (Full — Push)
        if: github.event_name != 'pull_request'
        run: cmake --build --preset ${{ matrix.config.build_preset }} --target chronon3d_tests

      # ── Run Tests ─────────────────────────────────────────────────────
      - name: Run Tests (Fast — PR)
        if: github.event_name == 'pull_request'
        run: |
          ctest --preset ${{ matrix.config.test_preset }} \
            -R "chronon3d_core_tests|chronon3d_scene_tests|chronon3d_cli_tests|chronon3d_optimizer_tests|chronon3d_cache_tests|chronon3d_compositor_tests" \
            --output-on-failure

      - name: Run Tests (Full — Push)
        if: github.event_name != 'pull_request'
        run: ctest --preset ${{ matrix.config.test_preset }} --output-on-failure

      # ── Clang-Tidy (static analysis, Linux only) ──────────────────────
      - name: Clang-Tidy (PR only)
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        run: |
          if command -v clang-tidy-18 &> /dev/null; then
            TIDY=clang-tidy-18
          elif command -v clang-tidy-17 &> /dev/null; then
            TIDY=clang-tidy-17
          elif command -v clang-tidy-16 &> /dev/null; then
            TIDY=clang-tidy-16
          elif command -v clang-tidy &> /dev/null; then
            TIDY=clang-tidy
          else
            echo "clang-tidy not found; skipping static analysis"
            exit 0
          fi
          BUILD_DIR="build/chronon/${{ matrix.config.preset }}"
          find src include apps -name '*.cpp' -o -name '*.hpp' | \
            xargs $TIDY --quiet --config-file=.clang-tidy -p "$BUILD_DIR" 2>&1 | \
            tee clang-tidy-report.txt
          if grep -q "error:" clang-tidy-report.txt; then
            echo "clang-tidy found errors!"
            exit 1
          fi
