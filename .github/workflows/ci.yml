name: Chronon CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: win-release
            build_preset: win
            test_preset: win-test
          - os: ubuntu-latest
            preset: linux-release
            build_preset: linux
            test_preset: linux-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare vcpkg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path C:\vcpkg\vcpkg.exe)) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Prepare vcpkg on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [[ ! -x "$HOME/vcpkg/vcpkg" ]]; then
            git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh"
          fi

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\tools\chronon-win.ps1 -Configuration Release -SkipCacheInstall
          ctest --preset ${{ matrix.test_preset }}

      - name: Build Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          CHRONON_SKIP_DEPS=0 bash ./tools/chronon-linux.sh
          ctest --preset ${{ matrix.test_preset }}
