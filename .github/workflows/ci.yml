name: Chronon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-release
            test_preset: linux-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ matrix.vcpkg_commit }}

      - name: Build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.preset }}
          buildPreset: linux

      - name: Clang-Tidy (static analysis)
        run: |
          if command -v clang-tidy-18 &> /dev/null; then
            TIDY=clang-tidy-18
          elif command -v clang-tidy-17 &> /dev/null; then
            TIDY=clang-tidy-17
          elif command -v clang-tidy-16 &> /dev/null; then
            TIDY=clang-tidy-16
          elif command -v clang-tidy &> /dev/null; then
            TIDY=clang-tidy
          else
            echo "clang-tidy not found; skipping static analysis"
            exit 0
          fi
          if [ ! -f build/compile_commands.json ]; then
            cmake --preset linux-release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          fi
          find src include apps -name '*.cpp' -o -name '*.hpp' | \
            xargs $TIDY --quiet --config-file=.clang-tidy -p build 2>&1 | \
            tee clang-tidy-report.txt
          if grep -q "error:" clang-tidy-report.txt; then
            echo "clang-tidy found errors!"
            exit 1
          fi

      - name: Run Tests
        run: |
          ctest --preset ${{ matrix.test_preset }}