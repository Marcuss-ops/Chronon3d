# ═══════════════════════════════════════════════════════════════════════════════
# ci.yml — Chronon3d CI Pipeline
# ═══════════════════════════════════════════════════════════════════════════════

name: Chronon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Linux (Release)
            slug: linux-release
            os: ubuntu-latest
            preset: linux-ci-release-build
            build_preset: linux-ci-release-build
            test_preset: linux-ci-release-build-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Linux (Debug/CI)
            slug: linux-debug-ci
            os: ubuntu-latest
            preset: linux-ci
            build_preset: linux-ci
            test_preset: linux-ci-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Linux (No Content)
            slug: linux-nocontent
            os: ubuntu-latest
            preset: linux-ci-nocontent
            build_preset: linux-ci-nocontent
            test_preset: linux-ci-nocontent-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Windows (Release)
            slug: windows-release
            os: windows-latest
            preset: win-release
            build_preset: win
            test_preset: win-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
      # Used only by checksum-pinned public fixture downloads. No repository
      # content or user data is uploaded by the bootstrap helper.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Gate / Test Hygiene (duplicate DOCTEST main)
        if: runner.os == 'Linux'
        working-directory: ${{ github.workspace }}
        run: bash tools/check_test_hygiene.sh

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ matrix.config.vcpkg_commit }}

      - name: Configure
        run: cmake --preset ${{ matrix.config.preset }}

      - name: Build (Fast — PR)
        if: github.event_name == 'pull_request'
        run: cmake --build --preset ${{ matrix.config.build_preset }} --target chronon3d_tests_fast

      - name: Build (Full — Push)
        if: github.event_name != 'pull_request'
        run: cmake --build --preset ${{ matrix.config.build_preset }} --target chronon3d_tests

      - name: Run Tests (Fast — PR)
        if: github.event_name == 'pull_request'
        run: |
          ctest --preset ${{ matrix.config.test_preset }} \
            -R "chronon3d_core_tests|chronon3d_scene_tests|chronon3d_cli_tests|chronon3d_render_job_contract_tests|chronon3d_optimizer_tests|chronon3d_cache_tests|chronon3d_compositor_tests" \
            --output-on-failure \
            --output-junit test-results-${{ matrix.config.slug }}.xml

      - name: Run Tests (Full — Push)
        if: github.event_name != 'pull_request'
        run: |
          ctest --preset ${{ matrix.config.test_preset }} \
            --output-on-failure \
            --output-junit test-results-${{ matrix.config.slug }}.xml

      - name: Cinematic showcase smoke (Linux Debug/CI, push only)
        if: github.event_name != 'pull_request' && matrix.config.preset == 'linux-ci' && runner.os == 'Linux'
        run: |
          bash tools/verify_cinematic_showcase.sh --smoke

      - name: Clang-Tidy (PR only)
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        run: |
          if command -v clang-tidy-18 &> /dev/null; then
            TIDY=clang-tidy-18
          elif command -v clang-tidy-17 &> /dev/null; then
            TIDY=clang-tidy-17
          elif command -v clang-tidy-16 &> /dev/null; then
            TIDY=clang-tidy-16
          elif command -v clang-tidy &> /dev/null; then
            TIDY=clang-tidy
          else
            echo "clang-tidy not found; skipping static analysis"
            exit 0
          fi
          BUILD_DIR="build/chronon/${{ matrix.config.preset }}"
          find src include apps -name '*.cpp' -o -name '*.hpp' | \
            xargs $TIDY --quiet --config-file=.clang-tidy -p "$BUILD_DIR" 2>&1 | \
            tee clang-tidy-report.txt
          if grep -q "error:" clang-tidy-report.txt; then
            echo "clang-tidy found errors!"
            exit 1
          fi

      - name: Generate CI status JSON
        if: runner.os == 'Linux'
        run: |
          python3 tools/ci_status_from_junit.py \
            --junit "test-results-${{ matrix.config.slug }}.xml" \
            --commit "${{ github.sha }}" \
            --workflow "${{ github.workflow }}" \
            --out "ci_status.json"

      - name: Upload CI status artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ci-status-${{ github.sha }}
          path: ci_status.json
          retention-days: 90
          if-no-files-found: ignore
