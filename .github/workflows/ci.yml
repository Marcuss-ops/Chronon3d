name: Chronon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-release
            build_preset: linux
            test_preset: linux-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'
          - os: ubuntu-latest
            preset: linux-ci
            build_preset: linux-ci
            test_preset: linux-ci-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'
          - os: ubuntu-latest
            preset: linux-asan
            build_preset: linux-asan
            test_preset: linux-asan-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'
          - os: windows-latest
            preset: win-release
            build_preset: win
            test_preset: win-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ matrix.vcpkg_commit }}

      - name: Build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.preset }}
          buildPreset: ${{ matrix.build_preset }}

      - name: Clang-Tidy (static analysis)
        if: runner.os == 'Linux'
        run: |
          if command -v clang-tidy-18 &> /dev/null; then
            TIDY=clang-tidy-18
          elif command -v clang-tidy-17 &> /dev/null; then
            TIDY=clang-tidy-17
          elif command -v clang-tidy-16 &> /dev/null; then
            TIDY=clang-tidy-16
          elif command -v clang-tidy &> /dev/null; then
            TIDY=clang-tidy
          else
            echo "clang-tidy not found; skipping static analysis"
            exit 0
          fi
          BUILD_DIR="build/chronon/${{ matrix.preset }}"
          if [ ! -f "$BUILD_DIR/compile_commands.json" ]; then
            cmake --preset "${{ matrix.preset }}" -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          fi
          find src include apps -name '*.cpp' -o -name '*.hpp' | \
            xargs $TIDY --quiet --config-file=.clang-tidy -p "$BUILD_DIR" 2>&1 | \
            tee clang-tidy-report.txt
          if grep -q "error:" clang-tidy-report.txt; then
            echo "clang-tidy found errors!"
            exit 1
          fi

      - name: Run Tests
        run: |
          ctest --preset ${{ matrix.test_preset }}
