# ═══════════════════════════════════════════════════════════════════════════════
# ci.yml — Chronon3d CI Pipeline
#
# Triggers:
#   push to main    → Full suite (build + run ALL tests)
#   pull_request    → Fast suite (build + run only fast tests for quick feedback)
#
# Matrix:
#   linux-ci            — Debug build (profiling OFF, faster compile), full suite
#   linux-ci-nocontent  — Debug, no content modules (validates modular build)
#
# Sanitizers (P2-A): ASan+UBSAN nightly + TSan weekly via
#   nightly-sanitizers.yml (not on every push — too slow for fast feedback).
# ═══════════════════════════════════════════════════════════════════════════════

name: Chronon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Linux (Release)
            os: ubuntu-latest
            preset: linux-ci-release-build
            build_preset: linux-ci-release-build
            test_preset: linux-ci-release-build-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Linux (Debug/CI)
            os: ubuntu-latest
            preset: linux-ci
            build_preset: linux-ci
            test_preset: linux-ci-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          - name: Linux (No Content)
            os: ubuntu-latest
            preset: linux-ci-nocontent
            build_preset: linux-ci-nocontent
            test_preset: linux-ci-nocontent-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

          # NOTE: ASan+UBSAN moved to nightly-sanitizers.yml (P2-A).

          - name: Windows (Release)
            os: windows-latest
            preset: win-release
            build_preset: win
            test_preset: win-test
            vcpkg_commit: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      # TICKET-110 — pre-build hygiene gate (gate #10b doctest, wired into
      # tools/wrap_push.sh as Step 4.5a).  Runs BEFORE the cmake build
      # because a duplicate DOCTEST_CONFIG_IMPLEMENT_WITH_MAIN hardbreaks
      # the link step; the cost is a single-grep audit (~1s) vs. a 5-10 min
      # CI rebuild on a duplicate.  Local-only execution per the gate
      # parity contract documented in docs/AGENT_WORKFLOW.md §6.
      - name: Gate / Test Hygiene (duplicate DOCTEST main)
        if: runner.os == 'Linux'
        working-directory: ${{ github.workspace }}
        run: bash tools/check_test_hygiene.sh

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ matrix.config.vcpkg_commit }}

      # ── Configure (vcpkg installs dependencies automatically) ─────────
      - name: Configure
        run: cmake --preset ${{ matrix.config.preset }}

      # ── Build: fast tests on PR, full suite on push to main ───────────
      # Note: parallelism is handled by CMakePresets.json ("jobs": 16).

      - name: Build (Fast — PR)
        if: github.event_name == 'pull_request'
        run: cmake --build --preset ${{ matrix.config.build_preset }} --target chronon3d_tests_fast

      - name: Build (Full — Push)
        if: github.event_name != 'pull_request'
        run: cmake --build --preset ${{ matrix.config.build_preset }} --target chronon3d_tests

      # ── Run Tests ─────────────────────────────────────────────────────
      - name: Run Tests (Fast — PR)
        if: github.event_name == 'pull_request'
        run: |
          ctest --preset ${{ matrix.config.test_preset }} \
            -R "chronon3d_core_tests|chronon3d_scene_tests|chronon3d_cli_tests|chronon3d_optimizer_tests|chronon3d_cache_tests|chronon3d_compositor_tests" \
            --output-on-failure

      - name: Run Tests (Full — Push)
        if: github.event_name != 'pull_request'
        run: ctest --preset ${{ matrix.config.test_preset }} --output-on-failure

      # ── Agent 2 / ci-showcase plan (Step 2/6) — daily smoke ──────────
      # Smoke runs ONLY on push to main, on the linux-ci matrix (where
      # CHRONON3D_BUILD_CONTENT=ON and the chronic showcase binary is
      # already produced by the `Build (Full — Push)` step above).
      # verify_cinematic_showcase.sh --smoke configures the showcase
      # binary to 1 composition × 2 frames, skips A4.5 (no contact-sheet
      # PNG) and A4.6 (no perf envelope), so daily CI stays artefact-
      # free.  The full 5×6 cohort still runs nightly-manual via
      # `.github/workflows/nightly-visual.yml`.
      - name: Cinematic showcase smoke (Linux Debug/CI, push only)
        if: github.event_name != 'pull_request' && matrix.config.preset == 'linux-ci' && runner.os == 'Linux'
        run: |
          bash tools/verify_cinematic_showcase.sh --smoke

      # ── Clang-Tidy (static analysis, Linux only) ──────────────────────
      - name: Clang-Tidy (PR only)
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        run: |
          if command -v clang-tidy-18 &> /dev/null; then
            TIDY=clang-tidy-18
          elif command -v clang-tidy-17 &> /dev/null; then
            TIDY=clang-tidy-17
          elif command -v clang-tidy-16 &> /dev/null; then
            TIDY=clang-tidy-16
          elif command -v clang-tidy &> /dev/null; then
            TIDY=clang-tidy
          else
            echo "clang-tidy not found; skipping static analysis"
            exit 0
          fi
          BUILD_DIR="build/chronon/${{ matrix.config.preset }}"
          find src include apps -name '*.cpp' -o -name '*.hpp' | \
            xargs $TIDY --quiet --config-file=.clang-tidy -p "$BUILD_DIR" 2>&1 | \
            tee clang-tidy-report.txt
          if grep -q "error:" clang-tidy-report.txt; then
            echo "clang-tidy found errors!"
            exit 1
          fi
