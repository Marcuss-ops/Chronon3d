name: Chronon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-release
            test_preset: linux-test
          - os: windows-latest
            preset: win-release
            test_preset: win-test

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4' # Matches vcpkg.json baseline

      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.preset }}
          buildPreset: ${{ matrix.build_preset || matrix.os == 'windows-latest' && 'win' || 'linux' }}

      - name: Run Tests
        shell: bash
        run: |
          ctest --preset ${{ matrix.test_preset }}
