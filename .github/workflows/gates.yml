# ═══════════════════════════════════════════════════════════════════════════════
# gates.yml — Chronon3D Pre-Merge Gate Pipeline (cheap gates)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Six cheap gates that run on every PR (and on push to main as a safety net).
# The sixth, `full-validation`, lives in a separate workflow
# `.github/workflows/gates-full-validation.yml` whose `on: pull_request.paths`
# filter runs it ONLY when the PR touches include/, src/, CMakeLists.txt,
# CMakePresets.json, vcpkg.json, or .github/workflows/.
#
# Job catalog (this file):
#   1. core-build               — Text/Video/Content/Diagnostics OFF.
#   2. sdk-build                — Text+Blend2D ON, no Content/Video.
#   3. public-header-check      — Every public header compiled standalone.
#   4. install-consumer-check   — cmake --install + external find_package.
#   5. architecture-check       — Static rules + doctest skip tickets +
#                                  architecture boundary grep (PR-0).
#   6. install-consumer-script  — tools/install_consumer_test.sh (PR-0).
#
# Why this file exists:
# The previous CI (ci.yml) only built `chronon3d_tests_fast` on PRs and
# deferred the rest to post-merge. This file makes the pre-merge surface area
# explicit and forbids any single failure.

name: Chronon Gates (cheap)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
  VCPKG_COMMIT: 'cb2981c4e03d421fa03b9bb5044cd1986180e7e4'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. Core build — Text OFF, Video OFF, Content OFF, Diagnostics OFF.
  # ─────────────────────────────────────────────────────────────────────
  core-build:
    name: Gate 1 / core-build (no text/video/content/diagnostics)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure
        run: cmake --preset linux-core-dev

      - name: Build (chronon3d_tests_fast)
        run: cmake --build --preset linux-core-dev

  # ─────────────────────────────────────────────────────────────────────
  # 2. SDK build — Text ON, Blend2D ON. Validates consumer-side link closure.
  # ─────────────────────────────────────────────────────────────────────
  sdk-build:
    name: Gate 2 / sdk-build (Text+Blend2D, no Content/Video)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure
        run: cmake --preset linux-lean-dev

      - name: Build (chronon3d_cli + chronon3d_tests_fast)
        run: cmake --build --preset linux-lean-dev

  # ─────────────────────────────────────────────────────────────────────
  # 3. Public-header check — every header compiled standalone.
  # ─────────────────────────────────────────────────────────────────────
  public-header-check:
    name: Gate 3 / public-header-check (each header compiled alone)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      # Configure+build enough to populate compile_commands.json. We then read
      # that file (1) to learn the exact include + define flags the project
      # itself uses, and (2) so that per-header checks see spdlog/fmt/glm/etc.
      # transitively. Without this the gate would false-positive on every
      # header that depends on a third-party include.
      - name: Configure (linux-lean-dev, with compile_commands)
        run: cmake --preset linux-lean-dev -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build enough to ensure compile_commands is up-to-date
        run: cmake --build --preset linux-lean-dev --target chronon3d_pipeline

      - name: Enumerate public headers
        run: |
          find include/chronon3d -maxdepth 3 -name '*.hpp' | sort > headers.txt
          wc -l headers.txt

      - name: Compile each header standalone
        run: |
          # Invoke tools/check_public_headers.py (a dedicated script) instead of
          # inlining Python via heredoc. Heredocs embedded inside YAML `|:` run
          # blocks tangle the YAML block-scalar terminator with the bash
          # heredoc terminator and confuse the YAML scanner. The Python script
          # reads project compile_flags from compile_commands.json so the
          # header checks see spdlog/fmt/glm/etc. transitively.
          python3 tools/check_public_headers.py \
            --compile-commands build/chronon/linux-lean-dev/compile_commands.json \
            --headers-list headers.txt \
            --out out

          if [ -s out/failures.txt ]; then
            echo "::error::Public headers that fail to compile standalone:"
            cat out/failures.txt
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────
  # 4. Install + consumer (find_package external CMake project).
  # ─────────────────────────────────────────────────────────────────────
  install-consumer-check:
    name: Gate 4 / install-consumer-check (cmake --install + external find_package)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure (Chronon3D itself)
        run: cmake --preset linux-ci

      - name: Build Chronon3D
        run: cmake --build build/chronon/linux-ci

      # Install under a project-local PREFIX (NOT to /usr/local). The consumer
      # project lives in ./consumer/, links Chronon3D::SDK, runs find_package.
      - name: Install to local PREFIX
        run: |
          mkdir -p consumer-install
          DESTDIR=$PWD/consumer-install cmake --install build/chronon/linux-ci

      - name: Build external consumer project
        run: |
          # NB: same heredoc-vs-YAML caution as in Gate 3 above. We split into
          # multiple `printf` calls so no `<<EOF` body crosses into YAML.
          mkdir -p consumer
          printf 'cmake_minimum_required(VERSION 3.25)\n' > consumer/CMakeLists.txt
          printf 'project(chronon_consumer LANGUAGES CXX)\n' >> consumer/CMakeLists.txt
          printf 'set(CMAKE_CXX_STANDARD 20 CACHE STRING "")\n' >> consumer/CMakeLists.txt
          printf 'set(CMAKE_CXX_STANDARD_REQUIRED ON CACHE BOOL "")\n' >> consumer/CMakeLists.txt
          printf 'find_package(Chronon3D CONFIG REQUIRED PATHS ${CMAKE_SOURCE_DIR}/../consumer-install/usr/local/lib/cmake/Chronon3D NO_DEFAULT_PATH)\n' >> consumer/CMakeLists.txt
          printf 'add_executable(chronon_consumer main.cpp)\n' >> consumer/CMakeLists.txt
          printf 'target_link_libraries(chronon_consumer PRIVATE Chronon3D::SDK)\n' >> consumer/CMakeLists.txt

          # main.cpp (consumer sanity check): three public headers + one type.
          printf '#include <chronon3d/chronon3d.hpp>\n' > consumer/main.cpp
          printf '#include <chronon3d/runtime.hpp>\n' >> consumer/main.cpp
          printf '#include <chronon3d/math/color.hpp>\n' >> consumer/main.cpp
          printf 'int main() { chronon3d::Color c{}; (void)c; return 0; }\n' >> consumer/main.cpp

          cmake -S consumer -B consumer/build -DCMAKE_PREFIX_PATH=$PWD/consumer-install/usr/local
          cmake --build consumer/build

  # ─────────────────────────────────────────────────────────────────────
  # 5. Architecture check — static analysis + skip-without-ticket guard.
  # ─────────────────────────────────────────────────────────────────────
  architecture-check:
    name: Gate 5 / architecture-check (static rules + doctest skip tickets)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x tools/test_architectural.sh
          chmod +x tools/check_architecture_boundaries.sh
          chmod +x tools/check_gitignored_dirs.sh
          test -x tools/check_skipped_tests.sh || chmod +x tools/check_skipped_tests.sh

      - name: Run tools/test_architectural.sh
        run: bash tools/test_architectural.sh

      - name: Run tools/check_architecture_boundaries.sh
        run: bash tools/check_architecture_boundaries.sh

      # 06 R5 boundary gate — ADVISORY ONLY until R2+R3+R4 fully land.
      # The boundary invariants (I1..I5) currently FAIL on `main`: 467/200
      # LOC on software_renderer.hpp; 28/6 non-local includes; 8
      # dynamic_cast<SoftwareRenderer*> sites; public graph::RenderBackend
      # dual-identity still in place.  Until those invariants are produced
      # by real refactors (R3 drops the dual identity, R4 slims the header,
      # R2 migrates the 33 SoftwareRenderer& processor sites), promoting
      # this step to a hard block would turn every PR red.  Promote by
      # removing `continue-on-error` once `bash
      # tools/check_software_renderer_boundary.sh; echo $?` returns 0.
      - name: Run tools/check_software_renderer_boundary.sh (06 R5 — advisory)
        continue-on-error: true
        run: |
          bash tools/check_software_renderer_boundary.sh
          echo "::notice::R5 boundary gate is advisory until R2..R4 land; current exit code is informational only."

      - name: Run tools/check_gitignored_dirs.sh
        run: bash tools/check_gitignored_dirs.sh

  # ────────────────────────────────────────────────────────────────────
  # 7. Profile measurement matrix — drives tools/measure_profile.sh on
  # each of the four linux-profile-* presets (08 plan + readme). Outputs
  # JSON+MD are uploaded via actions/upload-artifact@v4 for trend
  # dashboards and changelog attestations. Only `extended` runs `--build`
  # (the heaviest profile); the other three run configure-only so the
  # matrix stays cheap.
  # ────────────────────────────────────────────────────────────────────
  profile-measurement:
    name: Gate 7 / profile-measurement (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: core
          - profile: motion
          - profile: video
          - profile: extended
            build_args: "--build --parallel 16"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Make measure_profile.sh executable
        run: chmod +x tools/measure_profile.sh

      # matrix.build_args is empty for core/motion/video; only extended
      # carries `--build --parallel 16`. The `${{ }}` expansion collapses
      # to "" without leaving stray whitespace at script argv boundaries.
      - name: Measure profile (${{ matrix.profile }})
        run: |
          echo ">>> tools/measure_profile.sh ${{ matrix.profile }} ${{ matrix.build_args }}"
          bash tools/measure_profile.sh "${{ matrix.profile }}" ${{ matrix.build_args }}

      - name: Upload profile-measurement.json + .md
        uses: actions/upload-artifact@v4
        with:
          name: profile-${{ matrix.profile }}-measurement
          path: |
            build/profiles/linux-profile-${{ matrix.profile }}/profile-measurement.json
            build/profiles/linux-profile-${{ matrix.profile }}/profile-measurement.md
          if-no-files-found: error
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────
  # 6. Install consumer — end-to-end SDK boundary test (PR-0).
  # ────────────────────────────────────────────────────────────────────
  install-consumer-script:
    name: Gate 6 / install-consumer (tools/install_consumer_test.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: ${{ github.event_name == 'push' }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Install consumer
        if: runner.os == 'Linux'
        run: bash tools/install_consumer_test.sh
